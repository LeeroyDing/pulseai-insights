<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | PulseAI Insights</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { border-bottom: 2px solid #eee; margin-bottom: 2rem; padding-bottom: 1rem; }
        h1 { margin: 0; color: #007bff; }
        nav a { margin-right: 1rem; text-decoration: none; color: #666; }
        article { margin-bottom: 3rem; }
        .meta { color: #888; font-size: 0.9rem; }
        footer { margin-top: 4rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <header>
        <h1>PulseAI Insights</h1>
        <p>Daily AI Developments in Healthcare</p>
        <nav><a href="/">Home</a></nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Format "2006" }} PulseAI Insights. AI-Curated Content. Not medical advice.</p>
    </footer>
</body>
</html>
